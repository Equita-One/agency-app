name: Security scanning

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  schedule:
    - cron: '0 7 * * 1'

permissions:
  contents: read

jobs:
  gitleaks:
    name: Gitleaks (secret scan - required gate)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      # Free Gitleaks CLI (the gitleaks-action@v2 wrapper now requires a paid
      # GITLEAKS_LICENSE for org-owned repos; the CLI binary is MIT-licensed and free).
      - name: Run Gitleaks (CLI)
        run: |
          VERSION=8.18.4
          curl -sSfL "https://github.com/gitleaks/gitleaks/releases/download/v${VERSION}/gitleaks_${VERSION}_linux_x64.tar.gz" | tar -xz gitleaks
          ./gitleaks detect --source . --no-git --config .gitleaks.toml --redact --no-banner --exit-code 1

  semgrep:
    name: Semgrep (SAST - advisory)
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - name: Run Semgrep
        uses: returntocorp/semgrep-action@v1
        with:
          config: >-
            p/default
            p/secrets
            p/javascript

  trufflehog:
    name: TruffleHog (verified secrets - weekly)
    if: github.event_name == 'schedule'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Run TruffleHog
        uses: trufflesecurity/trufflehog@main
        with:
          extra_args: --only-verified
